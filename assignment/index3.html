<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart User Dashboard</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        .section {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
        }

        input {
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: calc(100% - 18px);
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #007bff;
            color: white;
            margin-right: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        .history-list {
            font-size: 0.9rem;
            color: #666;
            max-height: 100px;
            overflow-y: auto;
        }

        .alert-bg {
            background-color: #ffeb3b !important;
        }

        /* High count warning */
    </style>
</head>

<body>

    <div class="container" id="main-app">
        <h2>Smart Dashboard</h2>

        <div class="section">
            <input type="text" id="userNameInput" placeholder="Enter your name">
            <input type="number" id="userNumInput" placeholder="Enter a number">
            <p id="welcomeMsg">Welcome! Please enter your details.</p>
        </div>

        <div class="section">
            <h3 id="counterDisplay">User's Count: 0</h3>
            <button onclick="updateCounter(1)">Increase</button>
            <button onclick="updateCounter(-1)">Decrease</button>
            <p><strong>History:</strong> <span id="historyDisplay">[]</span></p>
        </div>

        <div class="section" id="profileSection">
            <h4>User Profile Object</h4>
            <pre id="profileObjectDisplay" style="background: #f0f0f0; padding: 10px; font-size: 0.8rem;"></pre>
            <div id="apiInfo" style="font-style: italic; color: #555;">Fetching extra data...</div>
        </div>
    </div>

    <script>
        let userProfile = {
            name: "Guest",
            count: 0,
            history: []
        };


        const nameInput = document.getElementById('userNameInput');
        const numInput = document.getElementById('userNumInput');
        const welcomeMsg = document.getElementById('welcomeMsg');
        const counterDisplay = document.getElementById('counterDisplay');
        const historyDisplay = document.getElementById('historyDisplay');
        const profileDisplay = document.getElementById('profileObjectDisplay');

        [span_4](start_span)
        nameInput.addEventListener('input', updateUI);
        numInput.addEventListener('input', updateUI);

        function updateUI() {
            userProfile.name = nameInput.value || "Guest";
            const num = parseInt(numInput.value);

            [span_5](start_span)
            let parity = isNaN(num) ? "" : (num % 2 === 0 ? "(Even)" : "(Odd)");
            welcomeMsg.innerText = `Welcome, ${userProfile.name}! Your number ${num || 0} is ${parity}.`;

            refreshDisplay();
        }

        function updateCounter(val) {
            userProfile.count += val;
            userProfile.history.push(userProfile.count);[span_6](start_span)

            [span_7](start_span)
            if (userProfile.count > 10) {
                document.body.classList.add('alert-bg');
            } else {
                document.body.classList.remove('alert-bg');
            }

            refreshDisplay();
        }

        function refreshDisplay() {
            [span_8](start_span)[span_9](start_span)
            counterDisplay.innerText = `${userProfile.name}'s Count: ${userProfile.count}`;
            historyDisplay.innerText = JSON.stringify(userProfile.history);
            profileDisplay.innerText = JSON.stringify(userProfile, null, 2);
        }

        [span_10](start_span)
        async function fetchExtraData() {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/users/1');
                const data = await response.json();
                document.getElementById('apiInfo').innerText =
                    `Verified Location: ${data.address.city} | Email: ${data.email}`;
            } catch (error) {
                document.getElementById('apiInfo').innerText = "Could not load API data.";
            }
        }


        fetchExtraData();
        refreshDisplay();
    </script>

</body>

</html>
